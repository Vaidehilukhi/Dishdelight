<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Share - Add Recipe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header></header>

    <div class="container">
        <div class="form-container" style="max-width: 600px;">
            <h2 class="text-center mb-1">Share Your Recipe</h2>
            <form id="add-recipe-form">
                <div class="form-group">
                    <label for="title">Recipe Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="ingredients">Ingredients (comma separated)</label>
                    <textarea id="ingredients" name="ingredients" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="instructions">Instructions</label>
                    <textarea id="instructions" name="instructions" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="image">Image URL</label>
                    <input type="url" id="image" name="image" placeholder="https://example.com/image.jpg">
                </div>
                <br>
                <button type="submit" class="btn btn-primary" style="width: 100%">Submit Recipe</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const recipeId = urlParams.get('id');

        if (recipeId) {
            document.title = 'Recipe Share - Edit Recipe';
            document.querySelector('h2').textContent = 'Edit Your Recipe';
            document.querySelector('button[type="submit"]').textContent = 'Update Recipe';
            loadRecipeData(recipeId);
        }

        async function loadRecipeData(id) {
            const recipe = await apiFetch(`/api/recipes/${id}`);
            if (recipe) {
                document.getElementById('title').value = recipe.title;
                document.getElementById('description').value = recipe.description;
                document.getElementById('ingredients').value = recipe.ingredients;
                document.getElementById('instructions').value = recipe.instructions;
                document.getElementById('image').value = recipe.image;
            }
        }

        document.getElementById('add-recipe-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                alert('Please sign in.');
                window.location.href = '/signin.html';
                return;
            }

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.userId = user.id;
            data.role = user.role; // Pass role for admin check

            let url = '/api/recipes';
            let method = 'POST';

            if (recipeId) {
                url = `/api/recipes/${recipeId}`;
                method = 'PUT';
            } else {
                data.userName = user.name;
            }

            const result = await apiFetch(url, {
                method: method,
                body: JSON.stringify(data)
            });

            if (result) {
                alert(recipeId ? 'Recipe updated successfully!' : 'Recipe added successfully!');
                window.location.href = recipeId ? `/recipe-detail.html?id=${recipeId}` : '/recipe-list.html';
            }
        });
    </script>

    <footer>
        <p>&copy; 2025 DishDelight. All rights reserved.</p>
    </footer>
</body>

</html>
